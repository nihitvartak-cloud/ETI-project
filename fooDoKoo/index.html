<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fooDoKoo - Recipe Converter</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header>
        <h1>fooDoKoo</h1>
        <p>Swap your non-veg recipes to veg and get AI-guided suggestions!</p>
    </header>

    <main>
        <section id="converter">
            <h2>Recipe Converter</h2>
            <div id="directionControls">
                <label><input type="radio" name="direction" value="toVeg" checked> Non‑veg → Veg</label>
                <label><input type="radio" name="direction" value="toNonVeg"> Veg → Non‑veg</label>
            </div>
            <textarea id="inputRecipe" placeholder="Paste your recipe here"></textarea>
            <button id="convertBtn">Convert</button>
            <h3>Converted Version</h3>
            <textarea id="outputRecipe" readonly></textarea>

            <div id="examples">
                <h3>Sample Recipes</h3>
                <select id="exampleSelect">
                    <option value="">-- choose example --</option>
                </select>
                <button id="loadExampleBtn">Load</button>
            </div>
        </section>

        <section id="suggestions">
            <h2>Dish Suggestions</h2>
            <input type="text" id="suggestionInput" placeholder="Type an ingredient or idea" />
            <button id="suggestBtn">Get Suggestions</button>
            <ul id="suggestionList"></ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 fooDoKoo</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
